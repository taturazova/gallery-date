<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Gallery Date 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Great+Vibes&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #1a0510;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: relative;
      width: 100vw;
      height: 100svh;
      height: 100vh;
      max-width: 430px;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url('assets/image.png') center / cover no-repeat;
    }

    /* subtle warm rose tint */
    .tint {
      position: absolute;
      inset: 0;
      background: rgba(180, 40, 70, 0.07);
    }

    .top-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 46%;
      background: linear-gradient(to bottom, rgba(248, 218, 228, 0.96) 52%, transparent);
    }

    .bottom-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 36%;
      background: linear-gradient(to top, rgba(248, 218, 228, 0.98) 62%, transparent);
    }

    /* ── floating hearts ── */
    .hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      opacity: 0;
      animation: floatUp 5s ease-in infinite;
    }

    .heart:nth-child(1) { left: 8%;  font-size: 0.85rem; animation-delay: 0s;   animation-duration: 5.5s; }
    .heart:nth-child(2) { left: 24%; font-size: 1.1rem;  animation-delay: 1.3s; animation-duration: 6.2s; }
    .heart:nth-child(3) { left: 44%; font-size: 0.7rem;  animation-delay: 2.6s; animation-duration: 5s;   }
    .heart:nth-child(4) { left: 61%; font-size: 1rem;    animation-delay: 0.9s; animation-duration: 6.6s; }
    .heart:nth-child(5) { left: 78%; font-size: 0.8rem;  animation-delay: 1.9s; animation-duration: 5.3s; }
    .heart:nth-child(6) { left: 90%; font-size: 0.65rem; animation-delay: 3.4s; animation-duration: 4.9s; }

    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0)     rotate(-10deg); }
      12%  { opacity: 0.85; }
      80%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(-80vh) rotate(15deg);  }
    }

    /* ── top text ── */
    .top-text {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 30px 24px 0;
      text-align: center;
      animation: softDrop 0.85s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    .for-you {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.7rem, 7.2vw, 2.2rem);
      color: #9c2a4a;
      margin-bottom: 2px;
    }

    .title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.5rem, 10.5vw, 3.2rem);
      color: #7a1433;
      text-shadow: 3px 4px 0 #f5b0c6, 6px 8px 0 rgba(122, 20, 51, 0.13);
      line-height: 1.25;
    }

    .tagline {
      margin-top: 10px;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.45rem, 6vw, 1.85rem);
      color: #b03060;
    }

    /* corner hearts */
    .deco {
      position: absolute;
      font-size: 1.05rem;
      animation: pulse 2.4s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .deco:nth-child(1) { top: 14px; left: 14px;  animation-delay: 0s;   }
    .deco:nth-child(2) { top: 20px; right: 14px; animation-delay: 0.6s; }
    .deco:nth-child(3) { top: 64px; left: 20px;  animation-delay: 1.2s; }
    .deco:nth-child(4) { top: 56px; right: 20px; animation-delay: 1.8s; }

    @keyframes pulse {
      from { opacity: 0.35; transform: scale(0.82); }
      to   { opacity: 1;    transform: scale(1.18); }
    }

    /* ── bottom text ── */
    .bottom-text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 28px 36px;
      text-align: center;
      animation: softRise 0.85s cubic-bezier(0.34, 1.4, 0.64, 1) 0.28s both;
    }

    .time {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.45rem, 6.2vw, 1.9rem);
      color: #7a1433;
      text-shadow: 2px 3px 0 #f5b0c6;
      margin-bottom: 8px;
    }

    .pizza {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.5rem, 6.4vw, 1.9rem);
      color: #9c2a4a;
    }

    .icons {
      margin-top: 12px;
      font-size: 1.4rem;
      letter-spacing: 8px;
    }

    /* ── animations ── */
    @keyframes softDrop {
      from { opacity: 0; transform: translateY(-22px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0)     scale(1);    }
    }

    @keyframes softRise {
      from { opacity: 0; transform: translateY(22px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bg"></div>
    <div class="tint"></div>
    <div class="top-overlay"></div>
    <div class="bottom-overlay"></div>

    <div class="hearts">
      <span class="heart">🤍</span>
      <span class="heart">💗</span>
      <span class="heart">🤍</span>
      <span class="heart">💕</span>
      <span class="heart">💗</span>
      <span class="heart">🤍</span>
    </div>

    <div class="top-text">
      <span class="deco">💕</span>
      <span class="deco">💕</span>
      <span class="deco">💕</span>
      <span class="deco">💕</span>
      <div class="for-you">this is me, your gf, inviting you for</div>
      <div class="title">Art Gallery<br>date 🎨</div>
    </div>

    <div class="bottom-text">
      <div class="time">⏰ be ready by 6:30 pm</div>
      <div class="time">👚 wear something nice</div>
      <div class="pizza">then we go eat pizza 🍕</div>
      <div class="icons">🖼️ 💕 🍕</div>
    </div>
  </div>
</body>
</html>
